spring:
  application:
    name: personal-ai-trainer
  datasource:
    url: jdbc:postgresql://localhost:5432/personal_ai_trainer
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres123}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      chat:
        options:
          model: gpt-4o
          temperature: 0.7

server:
  port: 8080

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-use-at-least-256-bits}
    expiration-ms: 86400000 # 24h
  cors:
    allowed-origins: http://localhost:4200
